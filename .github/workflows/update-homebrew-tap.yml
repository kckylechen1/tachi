name: Update Homebrew Tap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish to Homebrew tap (without leading v)"
        required: false

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAP_REPO: kckylechen1/homebrew-tachi
      FORMULA_PATH: tap/Formula/tachi.rb
    steps:
      - name: Check required secret
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not configured."
            echo "Create a fine-grained PAT with Contents: Read and Write on $TAP_REPO."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          cargo_version=$(python3 -c 'from pathlib import Path; import re; text = Path("crates/memory-server/Cargo.toml").read_text(); match = re.search(r"^version\s*=\s*\"([^\"]+)\"", text, re.MULTILINE); print(match.group(1) if match else "")')

          if [ -z "$cargo_version" ]; then
            echo "Could not find memory-server version in Cargo.toml."
            exit 1
          fi

          if [ "$version" != "$cargo_version" ]; then
            echo "Tag/workflow version ($version) does not match crates/memory-server/Cargo.toml ($cargo_version)."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula URL and sha256
        run: |
          python scripts/update_homebrew_formula.py "$FORMULA_PATH" --version "${{ steps.version.outputs.version }}"

      - name: Commit and push formula update
        working-directory: tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tachi.rb
          git commit -m "bump tachi to v${VERSION}"
          git push
