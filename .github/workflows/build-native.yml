name: Build & Publish Native Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish to npm (without leading v)"
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve and validate release version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          server_version=$(python3 -c 'from pathlib import Path; import re; text = Path("crates/memory-server/Cargo.toml").read_text(); match = re.search(r"^version\s*=\s*\"([^\"]+)\"", text, re.MULTILINE); print(match.group(1) if match else "")')
          node_crate_version=$(python3 -c 'from pathlib import Path; import re; text = Path("crates/memory-node/Cargo.toml").read_text(); match = re.search(r"^version\s*=\s*\"([^\"]+)\"", text, re.MULTILINE); print(match.group(1) if match else "")')
          node_pkg_version=$(node -p "require('./crates/memory-node/package.json').version")

          if [ -z "$server_version" ] || [ -z "$node_crate_version" ] || [ -z "$node_pkg_version" ]; then
            echo "Failed to resolve one or more release versions."
            exit 1
          fi

          if [ -z "$version" ]; then
            version="$server_version"
          fi

          if [ "$version" != "$server_version" ]; then
            echo "Tag/workflow version ($version) does not match crates/memory-server/Cargo.toml ($server_version)."
            exit 1
          fi

          if [ "$server_version" != "$node_crate_version" ]; then
            echo "memory-server version ($server_version) does not match crates/memory-node/Cargo.toml ($node_crate_version)."
            exit 1
          fi

          if [ "$server_version" != "$node_pkg_version" ]; then
            echo "memory-server version ($server_version) does not match crates/memory-node/package.json ($node_pkg_version)."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install node deps
        working-directory: crates/memory-node
        run: npm install

      - name: Build native module
        working-directory: crates/memory-node
        run: npx napi build --platform --release --cargo-cwd . --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: crates/memory-node/*.node
          if-no-files-found: error

  publish:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    name: Publish @chaoxlabs/tachi-node to npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install node deps
        working-directory: crates/memory-node
        run: npm install

      - name: Prepare npm package layout
        working-directory: crates/memory-node
        run: npx napi create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/memory-node/artifacts

      - name: Move artifacts
        working-directory: crates/memory-node
        run: npx napi artifacts -d artifacts

      - name: Verify package output
        working-directory: crates/memory-node
        run: |
          echo "=== Checking platform sub-packages ==="
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              PKG_NAME=$(node -e "console.log(require('./$dir/package.json').name)")
              echo "✅ $dir → $PKG_NAME"
              # Verify package name follows @chaoxlabs/tachi-node-* pattern
              if [[ "$PKG_NAME" != @chaoxlabs/tachi-node-* ]]; then
                echo "❌ Unexpected package name: $PKG_NAME (expected @chaoxlabs/tachi-node-*)"
                exit 1
              fi
            fi
          done

      - name: Publish platform packages
        working-directory: crates/memory-node
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              cd "$dir"
              npm publish --access public || true
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: crates/memory-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages
        run: |
          sleep 15
          for pkg in tachi-node tachi-node-darwin-arm64 tachi-node-darwin-x64 tachi-node-linux-x64-gnu tachi-node-linux-arm64-gnu tachi-node-win32-x64-msvc; do
            echo -n "@chaoxlabs/$pkg: "
            npm view "@chaoxlabs/$pkg" version 2>/dev/null || echo "⚠ not found yet (may need index time)"
          done

  package-plugin:
    needs: [resolve-version, publish]
    runs-on: ubuntu-latest
    name: Package plugin tarball
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build TypeScript
        working-directory: integrations/openclaw
        run: |
          npm install --ignore-scripts
          npx tsc -p tsconfig.json

      - name: Create tarball
        working-directory: integrations/openclaw
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          STAGING=$(mktemp -d)
          cp -r *.js *.d.ts *.d.ts.map openclaw.plugin.json package.json README.md CHANGELOG.md reranker.js "$STAGING/" 2>/dev/null || true
          node - "$STAGING/package.json" "$VERSION" <<'NODE'
          const fs = require("fs");
          const [pkgPath, version] = process.argv.slice(2);
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          pkg.optionalDependencies = pkg.optionalDependencies || {};
          pkg.optionalDependencies["@chaoxlabs/tachi-node"] = version;
          delete pkg.devDependencies;
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          tar -czf "tachi-openclaw-v${VERSION}.tar.gz" -C "$STAGING" .
          echo "TARBALL=tachi-openclaw-v${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: integrations/openclaw/${{ env.TARBALL }}
